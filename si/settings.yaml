# si/settings.yaml
# Единая конфигурация тикера Si для двух стратегий pj17 (embedding + sentiment).
# Секции common/embedding/sentiment/combined читаются через si/shared/config.py:
# каждая специфичная секция «накрывает» одноимённые ключи из common.

common:
  ticker: 'Si'  # Важно: тикер в верхнем регистре для корректного формирования имён БД и Markdown
  ticker_lc: 'si'  # Важно: тикер в нижнем регистре для формирования путей к файлам и папкам
  ticker_close: 'SiM6'               # Фьючерс для закрытия позиции (trade)
  ticker_open: 'SiM6'                # Фьючерс для открытия позиции (trade)
  quantity_test: 1                   # Количество контрактов для бэктеста и аналитики
  notional_capital: 90000            # Условный капитал для QuantStats отчёта

  # Выбор новостей по провайдеру
  provider: 'investing_prime_interfax'  # Новостные провайдеры: 'investing_prime_interfax' или 'prime_interfax'

  time_start: '21:00:00'  # Начало дневной свечи для формирования Markdown и расчета Equity (время предыдущей торговой сессии)
  time_end: '20:59:59'  # Конец дневной свечи для формирования Markdown и расчета Equity (время текущей торговой сессии)
  num_mds: 200                       # Последних интервалов (дней) для markdown
  num_dbs: 8                         # Последних файлов БД новостей для обработки
  start_date_download_minutes: '2025-06-24'  # Дата, с которой начинается загрузка минутных данных

  md_path: 'C:/Users/Alkor/gd/md_rss_all_oil_gaz'  # Путь для сохранения Markdown файлов с новостями
  db_news_dir: 'C:/Users/Alkor/gd/db_rss'  # Папка где хранятся БД с новостями
  path_db_minute: 'C:/Users/Alkor/gd/data_quote_db/{ticker}_futures_minute_2025.db' # Путь к минутной БД (используется в download_minutes_to_db.py)
  path_db_day:    'C:/Users/Alkor/gd/data_quote_db/{ticker}_futures_day_2025_21-00.db' # Путь к дневной БД (используется в convert_minutes_to_days.py)
  # CSV с минутами от QUIK lua-экспортёра (trade/quik_export_minutes.lua)
  quik_csv_path: 'C:/Users/Alkor/VSCode/pj17_combo_sentiment_embedding_trade/trade/quik_export/minutes.csv'

embedding:
  # Ollama-модель для векторизации
  model_name: 'embeddinggemma'  # Важно: модель для векторизации должна поддерживать русский язык, например 'embeddinggemma' или 'text-embedding-3-small'
  url_ai: 'http://localhost:11434/api/embeddings'  # URL для получения эмбеддингов от Ollama
  min_prev_files: 2  # Минимальное количество предыдущих файлов БД с новостями для расчёта эмбеддингов (задаёт стартовую дату для embedding_backtest.py)
  start_date_test: '2025-10-01' # Дата начала тестового периода для embedding_backtest.py (формат 'YYYY-MM-DD')
  test_days: 23  # Количество дней в тестовом периоде для embedding_backtest.py
  cache_file: 'C:/Users/Alkor/VSCode/pj17_combo_sentiment_embedding_trade/{ticker_lc}/embedding/embeddings_ollama.pkl'  # Файл для кэширования эмбеддингов от Ollama (используется в create_embedding.py)
  predict_path: 'C:/Users/Alkor/gd/predict_ai/{ticker_lc}_embedding'  # Путь для сохранения предсказаний embedding модели (embedding_to_predict.py)
  invert_signal: true  # Инверсия применяется в embedding_to_predict.py

sentiment:  # Конфигурация для sentiment стратегии (используется в sentiment_group_stats.py, sentiment_backtest.py, sentiment_to_predict.py)
  sentiment_model: 'gemma3:12b'  # Модель для анализа сентимента, например 'gemma3:12b' или 'gemma3:6b'
  sentiment_output_pkl: 'C:/Users/Alkor/VSCode/pj17_combo_sentiment_embedding_trade/{ticker_lc}/sentiment/sentiment_scores.pkl'  # Файл для сохранения рассчитанных сентимент-скороров (используется в sentiment_to_predict.py)
  predict_path: 'C:/Users/Alkor/gd/predict_ai/{ticker_lc}_sentiment'  # Путь для сохранения предсказаний sentiment модели (sentiment_to_predict.py)

  # Окно дат для sentiment_group_stats.py
  stats_date_from: '2025-09-01'  # Дата начала периода для анализа групповой статистики сентимента (формат 'YYYY-MM-DD')
  stats_date_to: '2027-01-01'  # Дата окончания периода для анализа групповой статистики сентимента (формат 'YYYY-MM-DD')

  # Окно дат для sentiment_backtest.py
  backtest_date_from: '2025-09-01'  # Дата начала тестового периода для sentiment_backtest.py (формат 'YYYY-MM-DD')
  backtest_date_to: '2027-01-01'  # Дата окончания тестового периода для sentiment_backtest.py (формат 'YYYY-MM-DD')

combined:  # Конфигурация для combined стратегии (используется в combined_to_predict.py)
  predict_path: 'C:/Users/Alkor/gd/predict_ai/{ticker_lc}_combined'  # Путь для сохранения предсказаний combined модели (combined_to_predict.py)
