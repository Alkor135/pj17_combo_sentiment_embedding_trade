# Правила для RTS sentiment_backtest.
#
# Правила матчатся сверху вниз, по первому совпадению.
# action: follow — торгуем по знаку sentiment (LONG если >0, SHORT если <0)
# action: invert — инвертируем (SHORT если >0, LONG если <0)
# action: skip   — не торгуем
#
# Диапазон, не покрытый ни одним правилом, — пропускается (эквивалент skip).
# Можно свободно добавлять/удалять/переставлять строки.
#
# Ниже — стартовая конфигурация на основе in-sample анализа:
#   - крайние отрицательные (-8..-5) следуют сигналу (прибыль на следовании)
#   - умеренные отрицательные (-4..-3) инвертируются (следование давало −23 680)
#   - маленькие (-2..+1) пропускаются (шум, мало данных)
#   - умеренные положительные (+2..+6) следуют сигналу (прибыль на следовании)
#   - крайние положительные (+7..+8) инвертируются (следование давало −23 780)
#
# ВНИМАНИЕ: in-sample fit, требует walk-forward валидации.

# rules:  # Автоподбор по датам с 2025-09-26 до 2026-04-05 (на основе in-sample анализа)
#   - {min: -10, max: -5, action: follow}
#   - {min: -4,  max: -3, action: invert}
#   - {min: -2,  max:  1, action: skip}
#   - {min:  2,  max:  6, action: follow}
#   - {min:  7,  max: 10, action: invert}

rules:  # По датам с 2025-09-26 до 2026-04-05 на детерминированной модели gemma3:12B
  - {min: -10, max: -6, action: follow}
  - {min: -5,  max: -3, action: invert}
  - {min: -2,  max:  2, action: follow}
  - {min:  3,  max:  5, action: invert}
  - {min:  6,  max:  7, action: follow}
  - {min:  8,  max: 10, action: invert}
